######## MAPI with LAMMPS ################
system_name: MAPI
module: lammps
run_name: run_MAPI_700K_1
input_filename: lammps_700K.in
additional_files:
  - MAPI
  - plumed.dat
external_files:
  metatomic.pt: /mnt/projects/sne/Gohar/9.EPFL_visit/train_runs/MAPI/run_1/metatomic_model.pt
copy_directories:
  metatomic_extensions: /mnt/projects/sne/Gohar/9.EPFL_visit/train_runs/MAPI/run_1/metatomic_extensions
  myp2: /mnt/projects/sne/Gohar/9.EPFL_visit/inputs/MAPI/lammps/myp2
slurm_settings:
  partition: "gpucloud"
  time: "4-00:00:00"
  gres: "shard:rtx_4000_ada:2"
  ntasks: 1
  cpus-per-task: 8
  mem: "16G"
